<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1A1A2E"/>

  <!-- Handshake icon centered -->
  <!-- Left hand (coming from left) -->
  <path d="M3 17.5 L9 14 L12 15.5 L14 14.5 L17.5 16" stroke="#F0C040" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Left fingers -->
  <path d="M14 14.5 L14 12.5" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M15.5 13.8 L15.5 11.8" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M17 14.3 L17 12.3" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right hand (coming from right) -->
  <path d="M29 17.5 L23 14 L20 15.5 L18 14.5 L14.5 16" stroke="#F0C040" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right fingers -->
  <path d="M18 14.5 L18 12.5" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16.5 13.8 L16.5 11.8" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M15 14.3 L15 12.3" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Clasped hands area -->
  <path d="M13.5 16 Q16 17.5 18.5 16" stroke="#F0C040" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Wrist left -->
  <path d="M9 14 L7 19 L9 20 L12 17" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Wrist right -->
  <path d="M23 14 L25 19 L23 20 L20 17" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
